<!DOCTYPE html>
<html lang="en">
<head>
  <title>Table Block Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/scripts/scripts.js" type="module" crossorigin="use-credentials"></script>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/lazy-styles.css">
</head>
<body>
  <header></header>
  <main>
    <div class="section">
      <div class="table">
        <div>
          <div>Caption</div>
          <div>Build Performance Comparison</div>
        </div>
        <div>
          <div>File Header</div>
          <div>File</div>
        </div>
        <div>
          <div>Minify Header</div>
          <div>Minify</div>
        </div>
        <div>
          <div>Main Header</div>
          <div>Main</div>
        </div>
        <div>
          <div>Delta Header</div>
          <div>Delta</div>
        </div>
        <div>
          <div>onContentLoad</div>
          <div>149 ms</div>
          <div>177 ms</div>
          <div>-28 ms</div>
        </div>
        <div>
          <div>onLoad</div>
          <div>174 ms</div>
          <div>206 ms</div>
          <div>-32 ms</div>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
