indices:
  blog-index:
    include:
      - /blog/**
    exclude:
      - /api/**
    target: /query-index.json
    properties:
      date:
        selectFirst: 'head > meta[property="article:published_time"], head > meta[name="date"]'
        value: |
          attribute(el, "content") && attribute(el, "content").includes("T")
            ? dateValue(characters(attribute(el, "content"), 0, 10), "YYYY-MM-DD")
            : (
              attribute(el, "content") && attribute(el, "content").includes("-")
                ? dateValue(attribute(el, "content"), "YYYY-MM-DD")
                : dateValue(attribute(el, "content"), "MM/DD/YYYY")
            )
      title:
        selectFirst: "main > div > h1, main h1, main h2"
        value: textContent(el)
      lastModified:
        selectFirst: "main time, main h4, main h3"
        value: textContent(el)
      description:
        selectFirst: "main > div:nth-child(n+4) p, main p"
        value: textContent(el)
      content:
        select: "main > div:nth-child(n+4) p, main p"
        value: |
          words(textContent(el), 0, 20)
      image:
        selectFirst: 'meta[name="image"], meta[property="og:image"], main > div img, main img'
        value: attribute(el, "content") || attribute(el, "src")
      author:
        selectFirst: 'meta[name="author"], meta[property="article:author"]'
        value: attribute(el, "content")
      path:
        selectFirst: "body"
        value: path
      category:
        select: 'meta[name="category"]'
        value: attribute(el, "content")
      tag:
        selectFirst: 'meta[name="tag"]'
        value: attribute(el, "content")
      tags:
        select: 'meta[property="article:tag"]'
        values: attribute(el, "content")
