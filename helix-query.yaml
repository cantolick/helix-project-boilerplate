indices:
  blog-index:
    include:
      - /blog/**
    exclude:
      - /api/**
    target: /query-index.json
    properties:
      date:
        select: 'head meta[name="date"]'
        value: dateValue(attribute(el, "content"), "YYYY-MM-DD")
      lastModifiedDate:
        select: 'head meta[name="date"]'
        value: attribute(el, "content")
      title:
        selectFirst: "main > div > h1, main h1, main h2"
        value: textContent(el)
      lastModified:
        selectFirst: "main time, main h4, main h3"
        value: textContent(el)
      description:
        # from metadata / SEO description, which should be driven by your metadata table
        select: 'head meta[name="description"]'
        value: attribute(el, "content")
      content:
        selectFirst: "main > div:nth-child(4), main > div:nth-child(3), main"
        value: textContent(el)
      image:
        selectFirst: 'head meta[property="og:image"], main img'
        value: attribute(el, "content") || attribute(el, "src")
      path:
        selectFirst: "body"
        value: path
      category:
        select: 'meta[name="category"]'
        value: attribute(el, "content")
      tags:
        select: 'meta[property="article:tag"]'
        values: attribute(el, "content")
